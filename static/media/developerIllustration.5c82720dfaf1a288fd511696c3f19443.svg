<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#1a73e8" stopOpacity="0.1" />
      <stop offset="100%" stopColor="#1a73e8" stopOpacity="0.05" />
    </linearGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#f4a460" />
      <stop offset="100%" stopColor="#d2a679" />
    </linearGradient>
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#1a73e8" />
      <stop offset="100%" stopColor="#1765cc" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bgGradient)" stroke="#1a73e8" strokeWidth="2" opacity="0.3"/>
  
  <!-- Head -->
  <circle cx="200" cy="120" r="50" fill="url(#skinTone)"/>
  
  <!-- Hair -->
  <path d="M 150 120 Q 150 60 200 50 Q 250 60 250 120" fill="#2c2c2c"/>
  
  <!-- Ears -->
  <circle cx="145" cy="125" r="12" fill="url(#skinTone)"/>
  <circle cx="255" cy="125" r="12" fill="url(#skinTone)"/>
  <circle cx="147" cy="125" r="6" fill="#d2a679"/>
  <circle cx="253" cy="125" r="6" fill="#d2a679"/>
  
  <!-- Face details -->
  <!-- Eyes -->
  <circle cx="185" cy="115" r="4" fill="#000"/>
  <circle cx="215" cy="115" r="4" fill="#000"/>
  <circle cx="187" cy="112" r="1.5" fill="#fff"/>
  <circle cx="217" cy="112" r="1.5" fill="#fff"/>
  
  <!-- Nose -->
  <path d="M 200 115 L 200 125" stroke="#d2a679" strokeWidth="2" fill="none"/>
  
  <!-- Smile -->
  <path d="M 185 130 Q 200 135 215 130" stroke="#c77a54" strokeWidth="2" fill="none" strokeLinecap="round"/>
  
  <!-- Neck -->
  <rect x="190" y="165" width="20" height="15" fill="url(#skinTone)"/>
  
  <!-- Shirt/Chest -->
  <rect x="140" y="180" width="120" height="140" rx="20" fill="url(#shirtGradient)"/>
  
  <!-- Laptop on chest -->
  <rect x="160" y="200" width="80" height="50" rx="3" fill="#f0f0f0" stroke="#333" strokeWidth="2"/>
  <!-- Laptop screen -->
  <rect x="165" y="205" width="70" height="35" fill="#1a73e8"/>
  <!-- Screen code/lines -->
  <line x1="170" y1="212" x2="220" y2="212" stroke="#fff" strokeWidth="1.5" opacity="0.7"/>
  <line x1="170" y1="217" x2="215" y2="217" stroke="#fff" strokeWidth="1.5" opacity="0.7"/>
  <line x1="170" y1="222" x2="210" y2="222" stroke="#fff" strokeWidth="1.5" opacity="0.7"/>
  <line x1="170" y1="227" x2="225" y2="227" stroke="#fff" strokeWidth="1.5" opacity="0.7"/>
  <line x1="170" y1="232" x2="205" y2="232" stroke="#fff" strokeWidth="1.5" opacity="0.7"/>
  <!-- Laptop keyboard -->
  <rect x="162" y="240" width="76" height="8" fill="#ddd" stroke="#999" strokeWidth="1"/>
  
  <!-- Left Arm -->
  <ellipse cx="130" cy="200" rx="25" ry="45" fill="url(#skinTone)" transform="rotate(-30 130 200)"/>
  <!-- Left hand -->
  <circle cx="115" cy="240" r="15" fill="url(#skinTone)"/>
  <!-- Fingers -->
  <rect x="105" y="240" width="5" height="12" rx="2" fill="url(#skinTone)"/>
  <rect x="110" y="242" width="5" height="14" rx="2" fill="url(#skinTone)"/>
  <rect x="115" y="241" width="5" height="13" rx="2" fill="url(#skinTone)"/>
  <rect x="120" y="242" width="5" height="12" rx="2" fill="url(#skinTone)"/>
  
  <!-- Right Arm -->
  <ellipse cx="270" cy="200" rx="25" ry="45" fill="url(#skinTone)" transform="rotate(30 270 200)"/>
  <!-- Right hand -->
  <circle cx="285" cy="240" r="15" fill="url(#skinTone)"/>
  <!-- Fingers -->
  <rect x="280" y="240" width="5" height="12" rx="2" fill="url(#skinTone)"/>
  <rect x="285" y="242" width="5" height="14" rx="2" fill="url(#skinTone)"/>
  <rect x="290" y="241" width="5" height="13" rx="2" fill="url(#skinTone)"/>
  <rect x="295" y="242" width="5" height="12" rx="2" fill="url(#skinTone)"/>
  
  <!-- Left Leg -->
  <rect x="165" y="315" width="22" height="60" rx="10" fill="url(#skinTone)"/>
  <!-- Left Shoe -->
  <ellipse cx="176" cy="380" rx="20" ry="12" fill="#333"/>
  <ellipse cx="176" cy="382" rx="18" ry="8" fill="#555"/>
  
  <!-- Right Leg -->
  <rect x="213" y="315" width="22" height="60" rx="10" fill="url(#skinTone)"/>
  <!-- Right Shoe -->
  <ellipse cx="224" cy="380" rx="20" ry="12" fill="#333"/>
  <ellipse cx="224" cy="382" rx="18" ry="8" fill="#555"/>
  
  <!-- Floating code brackets decoration -->
  <g opacity="0.3" fontSize="24" fill="#1a73e8">
    <text x="50" y="80" fontFamily="monospace" fontWeight="bold">&lt;</text>
    <text x="330" y="320" fontFamily="monospace" fontWeight="bold">/&gt;</text>
  </g>
  
  <!-- Profile indicator dot -->
  <circle cx="350" cy="350" r="8" fill="#1a73e8" opacity="0.5"/>
  <circle cx="350" cy="350" r="5" fill="#1a73e8" opacity="0.8"/>
</svg>
